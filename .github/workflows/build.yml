name: Build D-Mail

on:
  push:
  workflow_dispatch:

# Needed so the workflow can publish a Release (attach the APK).
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload debug APK (Actions artifact)
        uses: actions/upload-artifact@v4
        with:
          name: D-Mail-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # ---- Signed release: runs only if signing secrets are configured ----
      - name: Check for signing secrets
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No KEYSTORE_BASE64 secret set - skipping signed release build."
          fi

      - name: Decode keystore
        if: steps.signing.outputs.enabled == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore

      - name: Build signed release APK
        if: steps.signing.outputs.enabled == 'true'
        env:
          KEYSTORE_FILE: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon

      - name: Rename release APK
        if: steps.signing.outputs.enabled == 'true'
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk "out/D-Mail-${GITHUB_REF_NAME}.apk" 2>/dev/null \
            || cp app/build/outputs/apk/release/*.apk "out/D-Mail-${GITHUB_REF_NAME}.apk"

      - name: Upload release APK (Actions artifact)
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: D-Mail-release
          path: out/*.apk

      # ---- Publish a GitHub Release, but ONLY when a version tag is pushed ----
      - name: Publish GitHub Release
        if: steps.signing.outputs.enabled == 'true' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          name: D-Mail ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
